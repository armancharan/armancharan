name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    name: Web (Next app)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      # Deterministically re-render the piece crops + manifest FROM the committed
      # worker/src/targets.json (sharp is installed by `npm ci`; nuke-cloud.png is
      # committed). This does NOT resample/invent answers — it exercises the
      # generator and lets the data-consistency test verify pieces↔targets agree.
      - run: node scripts/generate-pieces.mjs
      - run: npx next typegen
      - run: npx tsc --noEmit
      - run: npm test
      - run: npm run build

  worker:
    name: Worker (Cloudflare)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - run: npm ci
      # worker/src/targets.json is committed (the single source of truth for the
      # answer set), so tsc resolves the import directly — no `cp example` needed.
      - run: npm run typecheck
