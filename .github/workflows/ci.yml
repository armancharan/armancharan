name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    name: Web (Next app)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      # Generate the real targets.json + piece crops from puzzle.config.json
      # (sharp is installed by `npm ci`; public/nuke-cloud.png is committed).
      # This exercises the generator AND produces real data for the
      # data-consistency test — replacing the old destructive `cp example` that
      # could silently mask a clobbered targets.json.
      - run: node scripts/generate-pieces.mjs
      - run: npx next typegen
      - run: npx tsc --noEmit
      - run: npm test
      - run: npm run build

  worker:
    name: Worker (Cloudflare)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - run: npm ci
      # targets.json holds the secret answer coords (gitignored); use the
      # checked-in example so tsc can resolve the import in CI.
      - run: cp src/targets.example.json src/targets.json
      - run: npm run typecheck
