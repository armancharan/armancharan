name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    name: Web (Next app)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      # targets.json holds the secret answer coords (gitignored) but is imported
      # by the puzzle stories; use the checked-in example so tsc/build resolve it.
      - run: cp worker/src/targets.example.json worker/src/targets.json
      - run: npx next typegen
      - run: npx tsc --noEmit
      - run: npm test
      - run: npm run build

  worker:
    name: Worker (Cloudflare)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - run: npm ci
      # targets.json holds the secret answer coords (gitignored); use the
      # checked-in example so tsc can resolve the import in CI.
      - run: cp src/targets.example.json src/targets.json
      - run: npm run typecheck
